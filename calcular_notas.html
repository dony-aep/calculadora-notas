<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de Notas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            margin: 0;
            background-color: #15202B;
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            overflow: auto;
        }

        .boton-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .boton {
            padding: 12px 24px;
            font-size: 24px;
            background-color: #1DA1F2;
            color: #ffffff;
            border: 2px solid #1DA1F2;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
        }

        .boton:hover {
            background-color: transparent;
            color: #1DA1F2;
        }

        .boton:active {
            transform: scale(0.95);
        }

        .container {
            display: none;
            width: 100%;
            max-width: 600px;
            background-color: #192734;
            padding: 45px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            position: relative;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .input-container {
            flex: 1 1 45%;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid #38444d;
            border-radius: 5px;
            background-color: #283442;
            color: #ffffff;
        }

        .result {
            margin-top: 10px;
            font-weight: bold;
            color: #ffffff;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #8899a6;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .pass-fail-message {
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            color: #ffffff;
        }

        .reset-button {
            padding: 10px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffffff;
            transition: color 0.3s, transform 0.3s;
        }

        .reset-button:hover {
            color: #1DA1F2;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="boton-container" id="botonContainer">
        <button class="boton" onclick="mostrarCalculadora()">Calculadora de Notas</button>
    </div>

    <div class="container" id="calculatorContainer">
        <h1 class="title">Calculadora de Notas</h1>
        <div class="row">
            <div class="input-container">
                <label for="nota1">Nota 1 [Formativa]</label>
                <input type="text" id="nota1" oninput="calcularPromedio(1, this.value)" placeholder="Ingrese la nota">
                <div id="result1" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota2">Nota 2 [Cognitiva]</label>
                <input type="text" id="nota2" oninput="calcularPromedio(2, this.value)" placeholder="Ingrese la nota">
                <div id="result2" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva1" style="margin-right: 10px;">Nota Definitiva 1 [Corte 1]</label>
                    <input type="text" id="notaDefinitiva1" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="nota3">Nota 3 [Formativa]</label>
                <input type="text" id="nota3" oninput="calcularPromedio(3, this.value)" placeholder="Ingrese la nota">
                <div id="result3" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota4">Nota 4 [Cognitiva]</label>
                <input type="text" id="nota4" oninput="calcularPromedio(4, this.value)" placeholder="Ingrese la nota">
                <div id="result4" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva2" style="margin-right: 10px;">Nota Definitiva 2 [Corte 2]</label>
                    <input type="text" id="notaDefinitiva2" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="nota5">Nota 5 [Formativa]</label>
                <input type="text" id="nota5" oninput="calcularPromedio(5, this.value)" placeholder="Ingrese la nota">
                <div id="result5" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota6">Nota 6 [Cognitiva]</label>
                <input type="text" id="nota6" oninput="calcularPromedio(6, this.value)" placeholder="Ingrese la nota">
                <div id="result6" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva3" style="margin-right: 10px;">Nota Definitiva 3 [Corte 3]</label>
                    <input type="text" id="notaDefinitiva3" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="notaDefinitivaTotal">Nota Definitiva Total</label>
                <input type="text" id="notaDefinitivaTotal" readonly>
            </div>
        </div>
        <div class="pass-fail-message" id="passFailMessage"></div>
            <div class="reset-button" onclick="reiniciarCampos()">Restablecer</div>
    </div>

    <script>
        function mostrarCalculadora() {
            const botonContainer = document.getElementById('botonContainer');
            const calculatorContainer = document.getElementById('calculatorContainer');
            botonContainer.style.display = 'none';
            calculatorContainer.style.display = 'block';
        }

        function calcularPromedio(notaNumero, valor) {
            let percentage;
            switch (notaNumero) {
                case 1:
                    percentage = 0.09;
                    break;
                case 2:
                    percentage = 0.21;
                    break;
                case 3:
                    percentage = 0.09;
                    break;
                case 4:
                    percentage = 0.21;
                    break;
                case 5:
                    percentage = 0.12;
                    break;
                case 6:
                    percentage = 0.28;
                    break;
                default:
                    percentage = 0;
            }
            let promedio = parseFloat(valor) * percentage;
            let resultElement = document.getElementById(`result${notaNumero}`);
            resultElement.innerHTML = promedio.toFixed(2);

            let notaDefinitiva1 = (parseFloat(document.getElementById('nota1').value) || 0) * 0.09 + (parseFloat(
                document.getElementById('nota2').value) || 0) * 0.21;
            let notaDefinitiva2 = (parseFloat(document.getElementById('nota3').value) || 0) * 0.09 + (parseFloat(
                document.getElementById('nota4').value) || 0) * 0.21;
            let notaDefinitiva3 = (parseFloat(document.getElementById('nota5').value) || 0) * 0.12 + (parseFloat(
                document.getElementById('nota6').value) || 0) * 0.28;

            document.getElementById('notaDefinitiva1').value = notaDefinitiva1.toFixed(2);
            document.getElementById('notaDefinitiva2').value = notaDefinitiva2.toFixed(2);
            document.getElementById('notaDefinitiva3').value = notaDefinitiva3.toFixed(2);

            let notaDefinitivaTotal = (notaDefinitiva1 + notaDefinitiva2 + notaDefinitiva3).toFixed(2);
            document.getElementById('notaDefinitivaTotal').value = notaDefinitivaTotal;

            const passFailMessage = document.getElementById('passFailMessage');
            if (parseFloat(notaDefinitivaTotal) >= 3.0) {
                passFailMessage.innerText = '¡Felicidades! Has aprobado la asignatura.';
                passFailMessage.style.color = 'green';
            } else {
                passFailMessage.innerText = 'Lo siento, no has aprobado la asignatura.';
                passFailMessage.style.color = 'red';
            }
        }

        function reiniciarCampos() {
            const inputFields = document.querySelectorAll('input[type="text"]');
            inputFields.forEach(input => {
                input.value = '';
            });

            const resultFields = document.querySelectorAll('.result');
            resultFields.forEach(result => {
                result.innerHTML = '';
            });

            const definitivaFields = document.querySelectorAll('input[id^="notaDefinitiva"]');
            definitivaFields.forEach(definitiva => {
                definitiva.value = '';
            });

            const definitivaTotalField = document.getElementById('notaDefinitivaTotal');
            definitivaTotalField.value = '';

            const passFailMessage = document.getElementById('passFailMessage');
            passFailMessage.innerText = '';
        }
    </script>
</body>

</html>
