<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de Notas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    

    <meta name="description" content="Calculadora de Notas">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Calculadora">
    <meta property="og:title" content="Calculadora de Notas">
    <meta property="og:description" content="Pagina Web para calcular las notas de una asignatura">
    <meta property="og:url" content="https://calculadora-notas-asignatura.vercel.app/">
</head>

<body>
    <div class="boton-container" id="botonContainer">
        <button class="boton" onclick="mostrarCalculadora()">Calculadora de Notas</button>
    </div>

    <div class="container" id="calculatorContainer">
        <h1 class="title">Calculadora de Notas</h1>
        <div class="row">
            <div class="input-container">
                <label for="nota1">Nota 1 [Formativa]</label>
                <input type="text" id="nota1" oninput="calcularPromedio(1, this.value)" placeholder="Ingrese la nota">
                <div id="result1" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota2">Nota 2 [Cognitiva]</label>
                <input type="text" id="nota2" oninput="calcularPromedio(2, this.value)" placeholder="Ingrese la nota">
                <div id="result2" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva1" style="margin-right: 10px;">Nota Definitiva 1 [Corte 1]</label>
                    <input type="text" id="notaDefinitiva1" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="nota3">Nota 3 [Formativa]</label>
                <input type="text" id="nota3" oninput="calcularPromedio(3, this.value)" placeholder="Ingrese la nota">
                <div id="result3" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota4">Nota 4 [Cognitiva]</label>
                <input type="text" id="nota4" oninput="calcularPromedio(4, this.value)" placeholder="Ingrese la nota">
                <div id="result4" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva2" style="margin-right: 10px;">Nota Definitiva 2 [Corte 2]</label>
                    <input type="text" id="notaDefinitiva2" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="nota5">Nota 5 [Formativa]</label>
                <input type="text" id="nota5" oninput="calcularPromedio(5, this.value)" placeholder="Ingrese la nota">
                <div id="result5" class="result"></div>
            </div>
            <div class="input-container">
                <label for="nota6">Nota 6 [Cognitiva]</label>
                <input type="text" id="nota6" oninput="calcularPromedio(6, this.value)" placeholder="Ingrese la nota">
                <div id="result6" class="result"></div>
            </div>
            <div class="input-container">
                <div style="display: flex; align-items: center;">
                    <label for="notaDefinitiva3" style="margin-right: 10px;">Nota Definitiva 3 [Corte 3]</label>
                    <input type="text" id="notaDefinitiva3" readonly>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="input-container">
                <label for="notaDefinitivaTotal">Nota Definitiva Total</label>
                <input type="text" id="notaDefinitivaTotal" readonly>
            </div>
        </div>
        <div class="pass-fail-message" id="passFailMessage"></div>
            <div class="reset-button" onclick="reiniciarCampos()">Restablecer</div>
    </div>

    <script src="script.js"></script>
    
</body>

</html>
