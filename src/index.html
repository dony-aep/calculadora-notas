<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CalNotas</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link id="app-favicon" rel="icon" type="image/png" href="assets/icons/calnotas-favicon-black-32.png">
  <meta name="theme-color" content="#121212">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..200,0..1,-50..200">
  
  <meta name="description" content="Calculadora de Notas en línea para estudiantes de la Universidad Americana, Colombia. Calcula tus notas con nuestra calculadora predeterminada o crea tu propia calculadora personalizada con porcentajes ajustables.">

  <!-- Open Graph Metadata -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Calculadora de Notas">
  <meta property="og:title" content="Calculadora de Notas - Universidad Americana">
  <meta property="og:description" content="Calcula tus notas de manera flexible con nuestra Calculadora de Notas. Elige entre la calculadora predeterminada o crea tu propia calculadora personalizada con porcentajes ajustables. Diseñada para estudiantes de la Universidad Americana, Colombia.">
  <meta property="og:url" content="https://calnotas.vercel.app/">
  <meta property="og:image" content="https://calnotas.vercel.app/assets/icons/calnotas-logo-black.png">
  
  <!-- Twitter Card Metadata -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@calculadoranotas">
  <meta name="twitter:title" content="Calculadora de Notas - Universidad Americana">
  <meta name="twitter:description" content="Calcula tus notas de manera precisa y personalizada. Utiliza nuestra calculadora predeterminada o crea tu propia calculadora con porcentajes ajustables. Perfecto para estudiantes de la Universidad Americana, Colombia.">
  <meta name="twitter:image" content="https://calnotas.vercel.app/assets/icons/calnotas-logo-black.png">

  <meta name="google" content="notranslate" class="material-symbols-outlined">
  <script>
    (() => {
      const favicon = document.getElementById('app-favicon');
      const colorScheme = window.matchMedia('(prefers-color-scheme: dark)');
      const updateFavicon = (isDark) => {
        favicon?.setAttribute(
          'href',
          isDark
            ? 'assets/icons/calnotas-favicon-white-32.png'
            : 'assets/icons/calnotas-favicon-black-32.png'
        );
      };

      updateFavicon(colorScheme.matches);

      if (typeof colorScheme.addEventListener === 'function') {
        colorScheme.addEventListener('change', (event) => updateFavicon(event.matches));
      } else if (typeof colorScheme.addListener === 'function') {
        colorScheme.addListener((event) => updateFavicon(event.matches));
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
  <noscript>
    <p>Please enable JavaScript to continue using this application.</p>
  </noscript>
</body>
</html>
